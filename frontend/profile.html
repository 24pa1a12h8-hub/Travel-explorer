<!DOCTYPE html>
<html>

<head>

<title>My Profile</title>
<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="topbar">
<h2>🌍 Travel Explorer</h2>
</div>

<div class="main">

<h1>👤 My Profile</h1>

<div class="review-card">

<h3>Email</h3>
<p id="userEmail"></p>

</div>

<div class="review-card">

<h3>My Reviews</h3>
<div id="myReviews"></div>

</div>

</div>

<script>

fetch("http://localhost:5000/experience/all")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(r=>{

html += `
<div class="review-card">
<h3>${r.destination}</h3>
<p>${r.description}</p>
<p><b>Tips:</b> ${r.tips}</p>
<p>⭐ ${r.rating}</p>
</div>
`;

});

document.getElementById("myReviews").innerHTML = html;

});

</script>

</body>
let email = localStorage.getItem("userEmail");

if(email){
document.getElementById("userEmail").innerText = email;
}
else{
document.getElementById("userEmail").innerText = "Guest User";
}

</html>
