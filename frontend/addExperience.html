<!DOCTYPE html>
<html>

<head>

<title>Add Travel Experience</title>
<link rel="stylesheet" href="styles.css">

<style>

.form-container{

max-width:500px;
margin:60px auto;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);

}

.form-container h2{
text-align:center;
margin-bottom:25px;
}

.form-container input,
.form-container textarea{

width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;

}

.form-container textarea{
height:120px;
}

.form-container button{

width:100%;
padding:12px;
background:#00aa6c;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;

}

.form-container button:hover{
background:#018a57;
}

</style>

</head>

<body>

<div class="topbar">
<h2>🌍 Travel Explorer</h2>
</div>

<div class="form-container">

<h2>Add Travel Experience</h2>

<form id="expForm">

<input id="destination" placeholder="Destination" required>

<textarea id="description" placeholder="Describe your travel experience"></textarea>

<input id="tips" placeholder="Travel Tips">

<input id="rating" placeholder="Rating (1-5)">

<button type="submit">Submit Review</button>

</form>

</div>

<script>

document.getElementById("expForm").addEventListener("submit",function(e){

e.preventDefault();

fetch("http://localhost:5000/experience/add",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

destination:document.getElementById("destination").value,
description:document.getElementById("description").value,
tips:document.getElementById("tips").value,
rating:document.getElementById("rating").value

})

})
.then(res=>res.text())
.then(data=>{

alert("Review Added Successfully");

});

});

</script>

</body>

</html>
